name: Publish Dashboard

on:
  workflow_run:
    workflows: ["Generate Dashboard"]
    types: [completed]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 3

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Push to public dashboard repo
        env:
          PAT: ${{ secrets.DASHBOARD_PAT }}
        run: |
          git clone --depth 1 https://x-access-token:${PAT}@github.com/sentinelalphax0a-tech/sentinel-dashboard.git /tmp/dashboard

          cp docs/index.html /tmp/dashboard/index.html

          cd /tmp/dashboard
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || {
            git commit -m "chore: update dashboard $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          }
