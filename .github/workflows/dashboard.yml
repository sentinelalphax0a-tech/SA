name: Generate & Publish Dashboard

on:
  schedule:
    - cron: "15 * * * *"   # Every hour, offset from scan to avoid race
  workflow_dispatch:

permissions:
  contents: read   # NO necesita write — ya no commitea a SA

jobs:
  dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DASHBOARD_ACCESS_KEY: ${{ secrets.DASHBOARD_ACCESS_KEY }}
        run: python -m src.dashboard.generate_dashboard

      - name: Push to public dashboard repo
        env:
          PAT: ${{ secrets.DASHBOARD_PAT }}
        run: |
          git clone --depth 1 https://x-access-token:${PAT}@github.com/sentinelalphax0a-tech/sentinel-dashboard.git /tmp/dashboard

          cp docs/index.html /tmp/dashboard/index.html

          cd /tmp/dashboard
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || {
            git commit -m "chore: update dashboard $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          }
